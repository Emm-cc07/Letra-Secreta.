<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Descubre la letra</title>

<style>

body{
font-family:Arial;
text-align:center;
color:white;
margin:0;
padding:0;
background:url("https://images.unsplash.com/photo-1526045612212-70caf35c14df") no-repeat center center fixed;
background-size:cover;
}

.contenedor{
background:rgba(0,0,0,0.6);
padding:30px;
margin:50px auto;
width:80%;
max-width:600px;
border-radius:20px;
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.barra{
width:100%;
height:30px;
background:#444;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progreso{
height:100%;
width:0%;
background:#ff4d6d;
transition:1s;
}

.corazones{
font-size:24px;
margin-top:10px;
}

.carro{
font-size:40px;
transition:1s;
}

.letra{
font-size:120px;
margin-top:20px;
animation:aparece 2s infinite alternate;
}

@keyframes aparece{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

</style>
</head>

<body>

<div class="contenedor">

<h1>💌 Descubre la letra secreta</h1>

<p id="pregunta"></p>

<div id="respuestas"></div>

<div class="barra">
<div id="barraProgreso" class="progreso"></div>
</div>

<div class="carro" id="carro">🏎️</div>

<div class="corazones" id="corazones"></div>

<div id="letraFinal"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
increment,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


// ================= FIREBASE =================

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "letra-oculta.firebaseapp.com",
projectId: "letra-oculta",
storageBucket: "letra-oculta.firebasestorage.app",
messagingSenderId: "820749594635",
appId: "1:820749594635:web:10259acdb01122f25bd70e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"game","progress");


// ================= PREGUNTAS =================

const preguntas=[

{p:"¿Quién escribió La Odisea?",r:["Homero","Platón","Aristóteles","Sócrates"],c:0},
{p:"¿Cuál es el planeta más grande?",r:["Marte","Júpiter","Saturno","Neptuno"],c:1},
{p:"¿Qué elemento tiene símbolo O?",r:["Oro","Osmio","Oxígeno","Plata"],c:2},
{p:"¿Quién pintó la Mona Lisa?",r:["Van Gogh","Da Vinci","Picasso","Rembrandt"],c:1},
{p:"¿Cuántos huesos tiene el cuerpo humano?",r:["206","210","180","150"],c:0},
{p:"¿Qué país tiene forma de bota?",r:["España","Italia","Grecia","Portugal"],c:1},
{p:"¿Océano más grande?",r:["Atlántico","Índico","Pacífico","Ártico"],c:2},
{p:"Gas que respiramos?",r:["Nitrógeno","Oxígeno","CO2","Helio"],c:1},
{p:"Teoría de relatividad?",r:["Newton","Einstein","Tesla","Bohr"],c:1},
{p:"Río más largo?",r:["Amazonas","Nilo","Yangtsé","Misisipi"],c:0},
{p:"Presión atmosférica?",r:["Barómetro","Termómetro","Higrómetro","Altímetro"],c:0},
{p:"Continentes?",r:["5","6","7","8"],c:2},
{p:"Metal líquido?",r:["Mercurio","Hierro","Cobre","Aluminio"],c:0},
{p:"Órgano que bombea sangre?",r:["Pulmón","Cerebro","Corazón","Hígado"],c:2},
{p:"Animal más grande?",r:["Elefante","Ballena azul","Tiburón","Jirafa"],c:1},
{p:"Planeta rojo?",r:["Marte","Venus","Mercurio","Urano"],c:0},
{p:"Idioma más hablado?",r:["Inglés","Español","Mandarín","Hindi"],c:2},
{p:"Leyes del movimiento?",r:["Newton","Darwin","Galileo","Curie"],c:0},
{p:"Produce insulina?",r:["Hígado","Páncreas","Riñón","Estómago"],c:1},
{p:"País más grande?",r:["China","EEUU","Rusia","Canadá"],c:2}

];


// ================= ESTADO =================

let progreso = 0;
let respondio = localStorage.getItem("respondio") === "true";

const pregunta=document.getElementById("pregunta");
const respuestas=document.getElementById("respuestas");


// crear documento si no existe

async function iniciar(){

const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{hearts:0});
}

}

iniciar();


// escuchar progreso global

onSnapshot(ref,(snap)=>{

if(snap.exists()){
progreso=snap.data().hearts;
}

actualizarUI();

});


// ================= UI =================

function actualizarUI(){

let porcentaje=(progreso/20)*100;

document.getElementById("barraProgreso").style.width=porcentaje+"%";
document.getElementById("carro").style.transform="translateX("+porcentaje*3+"px)";
document.getElementById("corazones").innerText="❤️".repeat(progreso);


// revelar letra SOLO si llega a 20

if(progreso>=20){

document.getElementById("letraFinal").innerHTML='<div class="letra">T</div>';
pregunta.innerText="💌 ¡La letra secreta fue descubierta!";
respuestas.innerHTML="";
return;

}


// bloquear si ya jugó

if(respondio){

pregunta.innerText="❤️ Gracias por participar";
respuestas.innerHTML="Es turno del siguiente jugador.";
return;

}


// mostrar pregunta

if(respuestas.innerHTML===""){
mostrarPregunta();
}

}


// ================= PREGUNTA =================

function mostrarPregunta(){

let q=Math.floor(Math.random()*preguntas.length);
let p=preguntas[q];

pregunta.innerText=p.p;
respuestas.innerHTML="";

p.r.forEach((resp,i)=>{

let btn=document.createElement("button");
btn.innerText=resp;

btn.onclick=async()=>{

respondio=true;
localStorage.setItem("respondio","true");

if(i===p.c){

pregunta.innerText="✅ Correcto";
await updateDoc(ref,{hearts:increment(1)});

}else{

pregunta.innerText="❌ Incorrecto";

}

respuestas.innerHTML="Es turno del siguiente jugador.";

};

respuestas.appendChild(btn);

});

}

</script>

</body>
</html>
